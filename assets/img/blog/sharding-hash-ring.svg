<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" font-family="system-ui,-apple-system,sans-serif">
<rect x="1" y="1" width="758" height="378" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
<defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0369a1"/></marker></defs>
<text x="36" y="46" font-size="21" font-weight="700" fill="#0f172a">Consistent hashing (hash ring)</text>
<text x="36" y="70" font-size="13.5" fill="#64748b">Each key maps clockwise to the next node; adding or removing a node moves only a small arc</text>
<circle cx="290" cy="230" r="110" fill="none" stroke="#cbd5e1" stroke-width="3"/>
<g text-anchor="middle">
<circle cx="290" cy="120" r="15" fill="#0369a1"/><text x="290" y="102" font-size="13" font-weight="700" fill="#0f172a">Node A</text>
<circle cx="385" cy="285" r="15" fill="#0369a1"/><text x="430" y="290" font-size="13" font-weight="700" fill="#0f172a">Node B</text>
<circle cx="195" cy="285" r="15" fill="#0369a1"/><text x="150" y="290" font-size="13" font-weight="700" fill="#0f172a">Node C</text>
<circle cx="360" cy="160" r="7" fill="#f59e0b"/>
<circle cx="330" cy="330" r="7" fill="#f59e0b"/>
<circle cx="210" cy="150" r="7" fill="#f59e0b"/>
</g>
<g stroke="#0369a1" stroke-width="1.8" fill="none" marker-end="url(#a)" stroke-dasharray="4 3">
<path d="M368 168 C 390 210, 388 250, 386 270"/>
<path d="M323 336 C 260 350, 220 320, 200 300"/>
<path d="M212 143 C 250 125, 270 122, 283 122"/>
</g>
<g text-anchor="start">
<circle cx="560" cy="150" r="7" fill="#f59e0b"/><text x="578" y="155" font-size="13" fill="#334155">key (data)</text>
<circle cx="560" cy="185" r="9" fill="#0369a1"/><text x="578" y="190" font-size="13" fill="#334155">node (server)</text>
<text x="560" y="235" font-size="12.5" fill="#64748b">A key belongs to the first</text>
<text x="560" y="254" font-size="12.5" fill="#64748b">node clockwise. Add or</text>
<text x="560" y="273" font-size="12.5" fill="#64748b">remove a node and only its</text>
<text x="560" y="292" font-size="12.5" fill="#64748b">arc of keys is reassigned.</text>
</g>
</svg>
