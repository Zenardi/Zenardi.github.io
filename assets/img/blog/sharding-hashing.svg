<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" font-family="system-ui,-apple-system,sans-serif">
<rect x="1" y="1" width="758" height="338" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
<defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L9,3 L0,6 Z" fill="#0369a1"/></marker></defs>
<text x="36" y="46" font-size="21" font-weight="700" fill="#0f172a">Hash-based sharding</text>
<text x="36" y="70" font-size="13.5" fill="#64748b">hash(key) mod N picks the destination shard</text>
<g text-anchor="middle">
<rect x="40" y="120" width="110" height="56" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/><text x="95" y="153" font-size="14" font-weight="600" fill="#0f172a">key</text>
<rect x="200" y="120" width="130" height="56" rx="12" fill="#eff6ff" stroke="#0369a1" stroke-width="2"/><text x="265" y="146" font-size="14" font-weight="600" fill="#0f172a">hash()</text><text x="265" y="164" font-size="11" fill="#0369a1">&#8594; 10</text>
<rect x="380" y="120" width="130" height="56" rx="12" fill="#eff6ff" stroke="#0369a1" stroke-width="2"/><text x="445" y="146" font-size="14" font-weight="600" fill="#0f172a">mod 3</text><text x="445" y="164" font-size="11" fill="#0369a1">10 % 3 = 1</text>
<rect x="600" y="86" width="120" height="42" rx="9" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/><text x="660" y="112" font-size="13" font-weight="600" fill="#64748b">Shard 0</text>
<rect x="600" y="134" width="120" height="42" rx="9" fill="#dbeafe" stroke="#0369a1" stroke-width="2"/><text x="660" y="160" font-size="13" font-weight="700" fill="#0369a1">Shard 1</text>
<rect x="600" y="182" width="120" height="42" rx="9" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/><text x="660" y="208" font-size="13" font-weight="600" fill="#64748b">Shard 2</text>
</g>
<g stroke="#0369a1" stroke-width="2" fill="none" marker-end="url(#a)">
<line x1="150" y1="148" x2="196" y2="148"/>
<line x1="330" y1="148" x2="376" y2="148"/>
<path d="M510 148 C 550 148, 560 155, 596 155"/>
</g>
<text x="380" y="280" text-anchor="middle" font-size="12.5" fill="#64748b">Example: hash 15 &#8594; 15 % 3 = 0 &#8594; Shard 0</text>
</svg>
