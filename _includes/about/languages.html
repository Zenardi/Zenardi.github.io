{% assign languages = include.source %}
<div class="lang-grid">
  {% for lang in languages %}
  <div class="lang-card wow animated fadeInUp" data-wow-delay=".1s">
    <div class="lang-head">
      <span class="lang-name">{{ lang.name }}</span>
      <span class="lang-level">{{ lang.level }}</span>
    </div>
    <div class="lang-dots" role="img" aria-label="{{ lang.name }}: {{ lang.level }}">
      {% for i in (1..5) %}
      <span class="lang-dot{% if i <= lang.proficiency %} filled{% endif %}"></span>
      {% endfor %}
    </div>
  </div>
  {% endfor %}
</div>
