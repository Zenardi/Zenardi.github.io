{% assign languages = include.source %}
<div class="lang-grid">
  {% for lang in languages %}
  <div class="lang-card wow animated fadeInUp" data-wow-delay=".1s">
    <div class="lang-head">
      <span class="lang-icon"><i class="fas fa-language" aria-hidden="true"></i></span>
      <div class="lang-headtext">
        <span class="lang-name">{{ lang.name }}</span>
        <span class="lang-level">{{ lang.level }}</span>
      </div>
    </div>
    <div class="lang-meter" role="img" aria-label="{{ lang.name }}: {{ lang.level }}">
      <span class="lang-meter-fill" style="width: {{ lang.proficiency | times: 20 }}%"></span>
    </div>
  </div>
  {% endfor %}
</div>
