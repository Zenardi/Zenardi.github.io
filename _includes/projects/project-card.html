<!-- Local override of portfolYOU's _includes/projects/project-card.html.
     Two fixes over the theme version:
       1. Image src runs through `relative_url` so local `image:` paths (e.g.
          assets/img/...) resolve from the site root, not relative to /projects/
          (the theme output a bare src that 404'd on the projects page).
       2. GitHub icon renders for remote projects OR any project whose URL is a
          github.com link, so local projects with a GitHub external_url match the
          remote cards. -->
<div class="wow animated fadeIn" data-wow-delay=".15s">
  <a href="{{ project_url }}" class="project card text-themed" {%- if external and site.open_new_tab -%} target="_blank" rel="noopener" {%- endif -%}>
    {%- if project_img -%}
    <img id="{{ project_id }}-img" class="card-img-top" src="{{ project_img | relative_url }}" alt="{{ project_name }}" />
    {%- endif -%}
    <div class="card-body">
      <h5 id="{{ project_id }}-name" class="card-title">
        {%- if project_type == "remote" or project_url contains "github.com" -%}
        <i class="fab fa-github" data-toggle="tooltip" data-placement="bottom" data-delay="250" title="GitHub Repository"></i> |&nbsp;
        {%- endif -%}
        {{ project_name }}
      </h5>
      <p id="{{ project_id }}-desc" class="card-text">{{ project_desc }}</p>
      <p id="{{ project_id }}-tools" class="card-text">
        {%- for tool in project_tools -%}
        <span class="badge badge-pill text-primary border border-primary ml-1">{{ tool }}</span>
        {%- endfor -%}
      </p>
    </div>
  </a>
</div>
